<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠爱到家 - 宠物领养平台</title>
    <link rel="stylesheet" href="//at.alicdn.com/t/c/font_4599322_6q5s9s8nq3.css">
    <link rel="stylesheet" href="libs/amazeui/css/amazeui.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 头部区域 -->
    <header class="header-section">
        <div class="header-content">
            <div class="header-left">
                <div class="location-box">
                    <i class="iconfont icon-location"></i>
                    <span class="location-text">北京市</span>
                    <i class="iconfont icon-arrow-down"></i>
                </div>
            </div>
            <div class="header-center">
                <div class="logo-box">
                    <i class="iconfont icon-paw"></i>
                    <span class="logo-text">宠爱到家</span>
                </div>
            </div>
            <div class="header-right">
                <i class="iconfont icon-scan"></i>
            </div>
        </div>
    </header>

    <!-- 搜索区域 -->
    <section class="search-section">
        <div class="search-box">
            <i class="iconfont icon-search"></i>
            <input type="text" id="globalSearch" placeholder="搜索宠物、商品、服务...">
            <i class="iconfont icon-camera"></i>
        </div>
    </section>

    <!-- 轮播图区域 -->
    <section class="banner-section">
        <div class="banner-container" id="carousel">
            <div class="banner-track">
                <div class="banner-item active">
                    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cute%20pet%20dog%20adoption%20warm%20family&image_size=square" alt="宠物领养">
                </div>
                <div class="banner-item">
                    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=healthy%20pet%20food%20fresh%20ingredients&image_size=square" alt="宠物鲜食">
                </div>
            </div>
            <div class="banner-dots">
                <span class="dot active" data-index="0"></span>
                <span class="dot" data-index="1"></span>
            </div>
        </div>
    </section>

    <!-- 功能入口区域 -->
    <section class="menu-section">
        <div class="menu-grid">
            <div class="menu-item" onclick="goToPage('pets.html')">
                <div class="menu-icon icon-pet">
                    <i class="iconfont icon-pet"></i>
                </div>
                <span class="menu-text">宠物领养</span>
            </div>
            <div class="menu-item" onclick="alert('宠物鲜食')">
                <div class="menu-icon icon-food">
                    <i class="iconfont icon-food"></i>
                </div>
                <span class="menu-text">宠物鲜食</span>
            </div>
            <div class="menu-item" onclick="alert('宠物活动')">
                <div class="menu-icon icon-activity">
                    <i class="iconfont icon-activity"></i>
                </div>
                <span class="menu-text">宠物活动</span>
            </div>
            <div class="menu-item" onclick="alert('上门喂养')">
                <div class="menu-icon icon-service">
                    <i class="iconfont icon-service"></i>
                </div>
                <span class="menu-text">上门喂养</span>
            </div>
            <div class="menu-item" onclick="alert('宠物摄影')">
                <div class="menu-icon icon-camera">
                    <i class="iconfont icon-camera"></i>
                </div>
                <span class="menu-text">宠物摄影</span>
            </div>
            <div class="menu-item" onclick="alert('宠物零食')">
                <div class="menu-icon icon-snack">
                    <i class="iconfont icon-snack"></i>
                </div>
                <span class="menu-text">宠物零食</span>
            </div>
            <div class="menu-item" onclick="alert('宠物医疗')">
                <div class="menu-icon icon-medical">
                    <i class="iconfont icon-medical"></i>
                </div>
                <span class="menu-text">宠物医疗</span>
            </div>
            <div class="menu-item" onclick="alert('更多服务')">
                <div class="menu-icon icon-more">
                    <i class="iconfont icon-more"></i>
                </div>
                <span class="menu-text">更多服务</span>
            </div>
        </div>
    </section>

    <!-- 宠物品类推荐 -->
    <section class="category-section">
        <div class="category-header">
            <span class="category-title">宠物品类</span>
            <span class="category-more">更多 <i class="iconfont icon-arrow-right"></i></span>
        </div>
        <div class="category-scroll">
            <div class="category-item">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cute%20dog%20portrait&image_size=square" alt="狗狗">
                <span>狗狗</span>
            </div>
            <div class="category-item">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cute%20cat%20portrait&image_size=square" alt="猫咪">
                <span>猫咪</span>
            </div>
            <div class="category-item">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cute%20rabbit%20portrait&image_size=square" alt="小宠">
                <span>小宠</span>
            </div>
            <div class="category-item">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cute%20bird%20portrait&image_size=square" alt="鸟类">
                <span>鸟类</span>
            </div>
            <div class="category-item">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cute%20fish%20aquarium&image_size=square" alt="水族">
                <span>水族</span>
            </div>
        </div>
    </section>

    <!-- 推荐领养区域 -->
    <section class="recommend-section">
        <div class="section-header">
            <div class="header-left">
                <span class="section-title">推荐领养</span>
                <span class="section-tag">今日精选</span>
            </div>
            <span class="section-more" onclick="goToPage('pets.html')">更多 <i class="iconfont icon-arrow-right"></i></span>
        </div>
        <div class="recommend-grid" id="petsContainer">
        </div>
    </section>

    <!-- 底部安全区域占位 -->
    <div class="bottom-safe-area"></div>

    <!-- 底部导航栏 -->
    <nav class="bottom-tab-bar">
        <div class="tab-item active" onclick="switchTab(this, 'index.html')">
            <i class="iconfont icon-home"></i>
            <span>首页</span>
        </div>
        <div class="tab-item" onclick="switchTab(this, 'pets.html')">
            <i class="iconfont icon-find"></i>
            <span>发现</span>
        </div>
        <div class="tab-item center" onclick="goToPage('pets.html')">
            <div class="center-btn">
                <i class="iconfont icon-paw"></i>
            </div>
        </div>
        <div class="tab-item" onclick="switchTab(this, 'favorites.html')">
            <i class="iconfont icon-message"></i>
            <span>消息</span>
        </div>
        <div class="tab-item" onclick="switchTab(this, 'profile.html')">
            <i class="iconfont icon-user"></i>
            <span>我的</span>
        </div>
    </nav>

    <script src="libs/amazeui/js/amazeui.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/index.js"></script>
    <script>
        let currentSlide = 0;
        let slideInterval;

        const slides = document.querySelectorAll('.banner-item');
        const dots = document.querySelectorAll('.dot');

        function showSlide(index) {
            slides.forEach(slide => slide.classList.remove('active'));
            dots.forEach(dot => dot.classList.remove('active'));
            
            currentSlide = (index + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
            dots[currentSlide].classList.add('active');
        }

        function nextSlide() {
            showSlide(currentSlide + 1);
        }

        function startAutoSlide() {
            slideInterval = setInterval(nextSlide, 4000);
        }

        function goToPage(url) {
            window.location.href = url;
        }

        function switchTab(element, url) {
            document.querySelectorAll('.tab-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');
            setTimeout(() => {
                window.location.href = url;
            }, 100);
        }

        document.addEventListener('DOMContentLoaded', function() {
            startAutoSlide();
        });
    </script>
</body>
</html>
