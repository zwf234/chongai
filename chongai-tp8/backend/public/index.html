<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠爱到家 - 让爱不再流浪</title>
    <link rel="stylesheet" href="libs/amazeui/css/amazeui.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 头部区域 -->
    <header class="new-header">
        <div class="header-top">
            <div class="header-logos">
                <div class="logo-left">
                    <span class="logo-paw">🐾</span>
                    <span class="logo-text">宠爱到家</span>
                </div>
                <span class="logo-divider">×</span>
                <div class="logo-right">
                    <div class="association-name">中国小动物保护协会</div>
                    <div class="association-en">C.S.A.P.A</div>
                </div>
            </div>
        </div>
        <div class="header-action">
            <div class="location-select">
                <span class="location-icon">📍</span>
                <span class="location-text" id="currentLocation">西安市</span>
                <span class="location-arrow">▼</span>
            </div>
            <div class="search-wrapper">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="globalSearch" placeholder="搜索宠物、服务、活动" />
                    <button class="search-go-btn">搜索</button>
                </div>
            </div>
        </div>
    </header>

    <!-- 轮播图 -->
    <section class="carousel-section">
        <div class="carousel-container" id="carousel">
            <div class="carousel-track">
                <div class="carousel-item active">
                    <img src="https://neeko-copilot.bytedance.net/api/text_to_image?prompt=cute%20dog%20and%20cat%20together%20playing%20in%20a%20park%20sunny%20happy&image_size=landscape_16_9" alt="领养活动1" />
                    <div class="carousel-overlay">
                        <span class="carousel-text">让每一个生命都值得被爱</span>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="https://neeko-copilot.bytedance.net/api/text_to_image?prompt=happy%20family%20adopting%20a%20dog%20warm%20family%20love&image_size=landscape_16_9" alt="领养活动2" />
                    <div class="carousel-overlay">
                        <span class="carousel-text">给它们一个温暖的家</span>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="https://neeko-copilot.bytedance.net/api/text_to_image?prompt=volunteer%20and%20pets%20playing%20happy%20colorful&image_size=landscape_16_9" alt="领养活动3" />
                    <div class="carousel-overlay">
                        <span class="carousel-text">我们一起守护毛孩子</span>
                    </div>
                </div>
            </div>
            <div class="carousel-dots">
                <span class="dot active" data-index="0"></span>
                <span class="dot" data-index="1"></span>
                <span class="dot" data-index="2"></span>
            </div>
        </div>
    </section>

    <!-- 功能板块 -->
    <section class="features-section">
        <div class="features-grid">
            <div class="feature-card" onclick="goToPage('pets.html')">
                <div class="feature-icon">🐕</div>
                <div class="feature-title">宠物领养</div>
            </div>
            <div class="feature-card" onclick="alert('宠物鲜食')">
                <div class="feature-icon">🥫</div>
                <div class="feature-title">宠物鲜食</div>
            </div>
            <div class="feature-card" onclick="alert('宠物活动')">
                <div class="feature-icon">🎉</div>
                <div class="feature-title">宠物活动</div>
            </div>
            <div class="feature-card" onclick="alert('上门喂养')">
                <div class="feature-icon">🏠</div>
                <div class="feature-title">上门喂养</div>
            </div>
            <div class="feature-card" onclick="alert('宠物摄影')">
                <div class="feature-icon">📷</div>
                <div class="feature-title">宠物摄影</div>
            </div>
            <div class="feature-card" onclick="alert('宠物零食')">
                <div class="feature-icon">🍖</div>
                <div class="feature-title">宠物零食</div>
            </div>
        </div>
    </section>

    <!-- 待领养宠物 -->
    <section class="pets-section-new">
        <div class="section-header-new">
            <h2 class="section-title-new">待领养的小伙伴</h2>
            <button class="view-all-new" onclick="goToPage('pets.html')">查看全部 →</button>
        </div>
        <div class="pets-grid" id="petsContainer">
        </div>
    </section>

    <!-- 底部导航 -->
    <nav class="am-tabs tab-bar">
        <ul class="am-avg-sm-5">
            <li class="active">
                <a href="index.html">
                    <span class="tab-icon">🏠</span>
                    <span class="tab-label">首页</span>
                </a>
            </li>
            <li>
                <a href="pets.html">
                    <span class="tab-icon">🔍</span>
                    <span class="tab-label">发现</span>
                </a>
            </li>
            <li class="tab-center-item">
                <a href="pets.html" class="tab-center-btn">
                    <span class="center-icon">🐾</span>
                </a>
            </li>
            <li>
                <a href="favorites.html">
                    <span class="tab-icon">❤️</span>
                    <span class="tab-label">收藏</span>
                </a>
            </li>
            <li>
                <a href="profile.html">
                    <span class="tab-icon">👤</span>
                    <span class="tab-label">我的</span>
                </a>
            </li>
        </ul>
    </nav>

    <script src="libs/amazeui/js/amazeui.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/index.js"></script>
    <script src="js/experience.js"></script>
</body>
</html>
