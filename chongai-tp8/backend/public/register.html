<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠爱到家 - 注册</title>
    <link rel="stylesheet" href="https://cdn.amazeui.org/amazeui/2.7.2/css/amazeui.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <button class="back-btn" onclick="goToPage('login.html')">←</button>
            <div class="logo-area">
                <span class="paw-icon">🐾</span>
                <span class="logo-text">宠爱到家</span>
            </div>
            <p class="auth-subtitle">加入我们，一起关爱流浪动物</p>
        </div>

        <form id="registerForm" class="auth-form">
            <div class="form-group">
                <label class="form-label">手机号</label>
                <input type="tel" id="phone" class="form-control" placeholder="请输入手机号" maxlength="11" />
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" id="password" class="form-control" placeholder="请输入密码" />
            </div>
            <div class="form-group">
                <label class="form-label">确认密码</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="请再次输入密码" />
            </div>
            <button type="submit" class="auth-btn">注册</button>
        </form>

        <div class="auth-footer">
            <span>已有账号？</span>
            <a href="login.html" class="auth-link">立即登录</a>
        </div>
    </div>

    <script src="https://cdn.amazeui.org/amazeui/2.7.2/js/amazeui.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var phone = document.getElementById('phone').value;
            var password = document.getElementById('password').value;
            var confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!phone || !password || !confirmPassword) {
                showModal('请填写完整信息');
                return;
            }
            
            if (phone.length !== 11) {
                showModal('请输入正确的手机号');
                return;
            }
            
            if (password.length < 6) {
                showModal('密码长度不能少于6位');
                return;
            }
            
            if (password !== confirmPassword) {
                showModal('两次密码不一致');
                return;
            }
            
            ajax({
                url: '/api/register',
                method: 'POST',
                data: { phone: phone, password: password, confirmPassword: confirmPassword },
                success: function(response) {
                    if (response.code === 200) {
                        showModal('注册成功');
                        setTimeout(function() {
                            window.location.href = 'login.html';
                        }, 1500);
                    }
                },
                error: function(response) {
                    showModal(response.msg || '注册失败');
                }
            });
        });
    </script>
    <script src="js/experience.js"></script>
</body>
</html>
